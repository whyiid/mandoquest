<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#ff8a3d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="MandoQuest" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <title>MandoQuest 🐉 — Learn Chinese!</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Reusable dragon mascot, cloned by JS -->
  <template id="dragon-tpl">
    <svg class="dragon idle" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <ellipse cx="50" cy="92" rx="22" ry="5" fill="rgba(45,42,74,.12)"/>
      <!-- wings -->
      <path d="M26 52 Q8 40 12 60 Q20 60 28 58 Z" fill="#7c4dff"/>
      <path d="M74 52 Q92 40 88 60 Q80 60 72 58 Z" fill="#7c4dff"/>
      <!-- tail -->
      <path d="M70 74 Q86 76 82 60 Q78 68 70 66 Z" fill="#2bbf8a"/>
      <!-- body -->
      <ellipse cx="50" cy="58" rx="30" ry="30" fill="#34d399"/>
      <!-- belly -->
      <ellipse cx="50" cy="64" rx="18" ry="20" fill="#d5fbe8"/>
      <!-- horns -->
      <path d="M38 30 L34 16 L44 28 Z" fill="#ffd23f"/>
      <path d="M62 30 L66 16 L56 28 Z" fill="#ffd23f"/>
      <!-- cheeks -->
      <circle cx="33" cy="58" r="6" fill="#ff9bd0" opacity=".7"/>
      <circle cx="67" cy="58" r="6" fill="#ff9bd0" opacity=".7"/>
      <!-- eyes -->
      <circle cx="41" cy="48" r="9" fill="#fff"/>
      <circle cx="59" cy="48" r="9" fill="#fff"/>
      <circle class="eye" cx="42" cy="49" r="4.5" fill="#2d2a4a"/>
      <circle class="eye" cx="58" cy="49" r="4.5" fill="#2d2a4a"/>
      <circle cx="40.5" cy="47.5" r="1.4" fill="#fff"/>
      <circle cx="56.5" cy="47.5" r="1.4" fill="#fff"/>
      <!-- smile -->
      <path class="mouth" d="M42 64 Q50 72 58 64" stroke="#2d2a4a" stroke-width="3" fill="none" stroke-linecap="round"/>
    </svg>
  </template>

  <div id="app">
    <!-- HOME ------------------------------------------------------------- -->
    <section id="screen-home" class="screen active">
      <div class="topbar">
        <span class="brand-title">MandoQuest</span>
        <span class="spacer"></span>
        <span class="chip" title="Day streak"><span class="big">🔥</span> <span id="hud-streak">0</span></span>
        <span class="chip" title="Total stars"><span class="big">⭐</span> <span id="hud-stars">0</span></span>
        <button class="chip sound-toggle" id="sound-toggle" type="button" title="Music & sound on/off" aria-label="Music and sound on or off"><span class="big" id="sound-ico">🔊</span></button>
      </div>

      <div class="mascot-row">
        <span id="home-dragon"></span>
        <div class="speech" id="home-speech">Let's learn Chinese!</div>
      </div>

      <h2 class="section-title">Pick a topic 🎯</h2>
      <div class="cat-grid" id="cat-grid"><!-- categories injected --></div>

      <div class="tile" id="sentence-tile" role="button">
        <span class="t-emoji">🧩</span>
        <div>
          <div class="t-name">Sentence Builder</div>
          <div class="t-sub">Put the words in order!</div>
        </div>
        <span class="spacer"></span>
        <span style="font-size:30px">➜</span>
      </div>

      <div style="height:20px"></div>
    </section>

    <!-- CATEGORY MENU ---------------------------------------------------- -->
    <section id="screen-category" class="screen">
      <div class="game-top">
        <button class="icon-btn" data-nav="home">⬅️</button>
        <div class="progress-dots"><span id="cat-title" style="font-weight:900;font-size:22px"></span></div>
        <span class="score-chip"><span id="cat-mastery">0%</span></span>
      </div>

      <div class="mascot-row">
        <span id="cat-dragon"></span>
        <div class="speech" id="cat-speech">Choose a game!</div>
      </div>

      <div class="mode-list" id="mode-list"><!-- mode tiles injected --></div>
      <div style="height:20px"></div>
    </section>

    <!-- GAME ------------------------------------------------------------- -->
    <section id="screen-game" class="screen">
      <div class="game-top">
        <button class="icon-btn" data-nav="back-cat">⬅️</button>
        <div class="progress-dots" id="game-dots"></div>
        <span class="score-chip">⭐ <span id="game-score">0</span></span>
      </div>
      <div class="game-area" id="game-area"><!-- mode renders here --></div>
    </section>

    <!-- RESULT ----------------------------------------------------------- -->
    <section id="screen-result" class="screen">
      <div class="center-col">
        <div class="result-card">
          <div id="result-dragon" style="display:flex;justify-content:center"></div>
          <div class="stars-row">
            <span class="big-star s1">⭐</span>
            <span class="big-star s2">⭐</span>
            <span class="big-star s3">⭐</span>
          </div>
          <div class="result-title" id="result-title">Great job!</div>
          <div class="result-xp" id="result-xp">+0 XP</div>
          <div class="speech" id="result-msg" style="margin-bottom:18px">You did it!</div>
          <div class="result-btns">
            <button class="btn secondary" data-nav="back-cat">🏠 Topics</button>
            <button class="btn" id="btn-again">🔁 Play again</button>
          </div>
        </div>
      </div>
    </section>
  </div>

  <div class="toast" id="toast"></div>

  <script src="data.js"></script>
  <script src="audio/manifest.js"></script>
  <script src="sfx.js"></script>
  <script src="app.js"></script>
</body>
</html>
